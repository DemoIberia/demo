<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Demos Mitel</title>

    <style>
        :root {
            --mitel-blue: #003b71;
            --mitel-purple: #6f2c91;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(
                135deg,
                var(--mitel-blue),
                var(--mitel-purple)
            );
        }

        .container {
            text-align: center;
            background: white;
            padding: 60px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 90%;
        }

        h1 {
            color: var(--mitel-blue);
            margin-bottom: 15px;
        }

        p {
            color: #666;
            margin-bottom: 40px;
        }

        .demo-button {
            display: inline-block;
            padding: 18px 36px;
            background: var(--mitel-purple);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            transition: 0.3s;
        }

        .demo-button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Portal de Demos Mitel</h1>

        <p>
            Selecciona una demostración para acceder al escenario correspondiente.
        </p>

        <a href="hotel.html" class="demo-button">
            🏨 Demo Hotel Mitel
        </a>
    </div>

</body>

</html>
